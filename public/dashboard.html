<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <style>
    :root { --bg:#0f172a; --panel:#111827; --accent:#38bdf8; --text:#e5e7eb; --muted:#94a3b8; --radius:10px; }
    body {
      font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
      background: radial-gradient(circle at 10% 20%, #1e293b 0%, #0f172a 40%, #0b1222 100%);
      color: var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px;
    }
    .card {
      width:min(700px,100%); background:var(--panel); border:1px solid #1f2937;
      box-shadow:0 20px 60px rgba(0,0,0,0.4); padding:28px; border-radius:var(--radius);
    }
    h1 { margin:0 0 8px; font-size:26px; }
    p { color:var(--muted); margin:0 0 16px; }
    button, a.btn {
      display:inline-block; text-decoration:none; border:none; border-radius:8px;
      padding:10px 16px; background:var(--accent); color:#0b1222; font-weight:600;
      box-shadow:0 10px 30px rgba(56,189,248,0.35); transition:transform 120ms ease;
    }
    button:hover, a.btn:hover { transform:translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dashboard</h1>
    <p>You’re logged in.</p>
    <a class="btn" href="#" onclick="fetch('/auth/logout',{method:'POST'}).then(()=>location='/');return false;">Log out</a>
  </div>
</body>
</html>
